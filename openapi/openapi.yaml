    delete:
      summary: Delete virtual machine
      tags: [virtual-machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: deleted

  /virtual-machines/{name}:redeploy:
    parameters:
      - $ref: '#/components/parameters/VirtualMachineName'
