        - in: query
          name: hypervisorRef
          schema:
            type: string
        - in: query
          name: subnetRef
          schema:
            type: string
        - in: query
          name: ipAssignment
          schema:
            type: string
            enum: [dhcp, static]
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVirtualMachinesResponse'
    post:
      summary: Create virtual machine
      tags: [virtual-machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: query
          name: virtualMachineId
          required: true
          schema:
            type: string
          description: User-specified virtual machine ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualMachineRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualMachine'

  /virtual-machines/{name}:
    parameters:
      - $ref: '#/components/parameters/VirtualMachineName'
    get:
      summary: Get virtual machine
      tags: [virtual-machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
