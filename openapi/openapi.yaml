            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditEventsResponse'

  /dns-records:
    get:
      summary: List manual DNS records
      tags: [dns-records]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDNSRecordsResponse'
        '409':
          $ref: '#/components/responses/Conflict'
    post:
      summary: Create manual DNS record
      tags: [dns-records]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSRecordInput'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSRecord'

  /dns-records/{name}/{type}:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
      - in: path
        name: type
        required: true
        schema:
          type: string
          enum: [A, CNAME, TXT]
    put:
      summary: Update manual DNS record
      tags: [dns-records]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSRecordUpdateInput'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSRecord'
    delete:
      summary: Delete manual DNS record
      tags: [dns-records]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: deleted

  /users:
    post:
      summary: Create user
      tags: [users]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: created

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  parameters:
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 0
        maximum: 500
      description: Maximum number of resources to return. Defaults to 100.
    PageToken:
      in: query
      name: pageToken
      schema:
        type: string
      description: Token returned by the previous list response.
    MachineName:
      in: path
      name: name
      required: true
      schema:
        type: string
      description: Machine ID. Response resources expose the canonical name machines/{machine}.
    VirtualMachineName:
      in: path
      name: name
      required: true
      schema:
        type: string
      description: Virtual machine ID. Response resources expose the canonical name virtualMachines/{virtualMachine}.
    HypervisorName:
      in: path
      name: name
      required: true
      schema:
        type: string
    SubnetName:
      in: path
      name: name
      required: true
      schema:
        type: string
    SSHKeyName:
      in: path
      name: name
      required: true
      schema:
        type: string
    CloudInitTemplateName:
      in: path
      name: name
      required: true
      schema:
        type: string
    OSImageName:
      in: path
      name: name
      required: true
      schema:
        type: string
    BootEnvironmentName:
      in: path
      name: name
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        state:
          type: string
        error:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    CreateFirstAdminRequest:
      allOf:
        - $ref: '#/components/schemas/LoginRequest'

    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        role:
          type: string
          enum: [admin, operator, viewer]

    ListMetadata:
      type: object
      required: [totalSize]
      properties:
        nextPageToken:
          type: string
        totalSize:
          type: integer
          minimum: 0

    CreateMachineRequest:
      type: object
      required: [machine]
      properties:
        machineId:
          type: string
          description: User-specified ID. Prefer query parameter machineId for HTTP/JSON.
        machine:
          $ref: '#/components/schemas/MachineSpec'

    MachineSpec:
      type: object
      required: [hostname, mac, arch, firmware, power, osPreset]
      properties:
        hostname:
          type: string
        mac:
          type: string
        ip:
          type: string
        arch:
          type: string
        firmware:
          type: string
          enum: [uefi, bios]
        power:
          $ref: '#/components/schemas/PowerConfig'
        network:
          type: object
          additionalProperties: true
        osPreset:
          $ref: '#/components/schemas/MachineOSPreset'
        targetDisk:
          type: string
        cloudInitRef:
          type: string
          description: Canonical resource name cloudInitTemplates/{template}.
        cloudInitRefs:
          type: array
          items:
            type: string
        ipAssignment:
          type: string
          enum: [dhcp, static]
        subnetRef:
          type: string
          description: Canonical resource name subnets/{subnet}.
        role:
          type: string
        bridgeName:
          type: string
        sshKeyRefs:
          type: array
          items:
            type: string
        loginUser:
          $ref: '#/components/schemas/LoginUserSpec'

    RedeployMachineRequest:
      allOf:
        - $ref: '#/components/schemas/MachineSpec'
        - type: object
          properties:
            confirm:
              type: string

    Machine:
      allOf:
        - $ref: '#/components/schemas/MachineSpec'
        - type: object
          required: [name, machineId, phase, createdAt, updatedAt]
          properties:
            name:
              type: string
              example: machines/node-01
            machineId:
              type: string
              example: node-01
            phase:
              type: string
            provision:
              $ref: '#/components/schemas/ProvisionProgress'
            lastPowerAction:
              type: string
            lastDeployedCloudInitRef:
              type: string
            lastError:
              type: string
            powerState:
              type: string
            powerStateAt:
              type: string
              format: date-time
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    MachineOSPreset:
      type: object
      required: [family, version]
      properties:
        family:
          type: string
        version:
          type: string
        imageRef:
          type: string
          description: Canonical resource name osImages/{image}.
        installConfig:
          type: object
          additionalProperties:
            type: string

    ListMachinesResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [machines]
          properties:
            machines:
              type: array
              items:
                $ref: '#/components/schemas/Machine'

    CreateVirtualMachineRequest:
      type: object
      required: [virtualMachine]
      properties:
        virtualMachineId:
          type: string
          description: User-specified ID. Prefer query parameter virtualMachineId for HTTP/JSON.
        virtualMachine:
          $ref: '#/components/schemas/VirtualMachineSpec'

    VirtualMachineSpec:
      type: object
      required: [resources, powerControlMethod]
      properties:
        hypervisorRef:
          type: string
          description: Canonical resource name hypervisors/{hypervisor}.
        resources:
          type: object
          required: [cpuCores, memoryMB, diskGB]
          properties:
            cpuCores:
              type: integer
            memoryMB:
              type: integer
            diskGB:
              type: integer
        osImageRef:
          type: string
        cloudInitRef:
          type: string
        cloudInitRefs:
          type: array
          items:
            type: string
        network:
          type: array
          items:
            type: object
            additionalProperties: true
        ipAssignment:
          type: string
          enum: [dhcp, static]
        subnetRef:
          type: string
        domain:
          type: string
        installConfig:
          type: object
          additionalProperties: true
        powerControlMethod:
          type: string
        advancedOptions:
          type: object
          additionalProperties: true
        sshKeyRefs:
          type: array
          items:
            type: string
        loginUser:
          $ref: '#/components/schemas/LoginUserSpec'

    RedeployVirtualMachineRequest:
      allOf:
        - $ref: '#/components/schemas/VirtualMachineSpec'
        - type: object
          properties:
            confirm:
              type: string

    MigrateVirtualMachineRequest:
      type: object
      properties:
        targetHypervisor:
          type: string
          description: Canonical resource name hypervisors/{hypervisor}.

    VirtualMachine:
      allOf:
        - $ref: '#/components/schemas/VirtualMachineSpec'
        - type: object
          required: [name, virtualMachineId, phase, createdAt, updatedAt]
          properties:
            name:
              type: string
              example: virtualMachines/vm-01
            virtualMachineId:
              type: string
              example: vm-01
            phase:
              type: string
            libvirtDomain:
              type: string
            hypervisorName:
              type: string
            ipAddresses:
              type: array
              items:
                type: string
            networkInterfaces:
              type: array
              items:
                type: object
                additionalProperties: true
            provisioning:
              $ref: '#/components/schemas/ProvisioningStatus'
            lastPowerAction:
              type: string
            lastDeployedCloudInitRef:
              type: string
            lastError:
              type: string
            createdOnHost:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ListVirtualMachinesResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [virtualMachines]
          properties:
            virtualMachines:
              type: array
              items:
                $ref: '#/components/schemas/VirtualMachine'

    LoginUserSpec:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        passwordConfigured:
          type: boolean
          readOnly: true

    PowerConfig:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [manual, wol, ipmi, webhook]
        manual:
          type: object
          additionalProperties: true
        wol:
          type: object
          additionalProperties: true
        ipmi:
          type: object
          additionalProperties: true
        webhook:
          type: object
          additionalProperties: true

    ProvisionProgress:
      type: object
      properties:
        active:
          type: boolean
        attemptId:
          type: string
        inventoryId:
          type: string
        startedAt:
          type: string
          format: date-time
        deadlineAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        trigger:
          type: string
        requestedBy:
          type: string
        message:
          type: string
        artifacts:
          type: object
          additionalProperties:
            type: string
        completionSource:
          type: string
        lastSignalAt:
          type: string
          format: date-time
        failureReason:
          type: string
        logUrl:
          type: string

    ProvisioningStatus:
      type: object
      properties:
        active:
          type: boolean
        startedAt:
          type: string
          format: date-time
        deadlineAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        completionSource:
          type: string
        lastSignalAt:
          type: string
          format: date-time

    UpdateMachineSettingsRequest:
      type: object
      required: [power]
      properties:
        power:
          $ref: '#/components/schemas/PowerConfig'

    UpdateMachineNetworkRequest:
      type: object
      properties:
        ip:
          type: string
        ipAssignment:
          type: string
          enum: [dhcp, static]
        subnetRef:
          type: string
        domain:
          type: string

    DiscoverMachineRequest:
      type: object
      required: [mac]
      properties:
        mac:
          type: string
        clientHostname:
          type: string
        arch:
          type: string
        firmware:
          type: string

    SubnetInput:
      type: object
      required: [name, spec]
      properties:
        name:
          type: string
        spec:
          type: object
          additionalProperties: true

    Subnet:
      allOf:
        - $ref: '#/components/schemas/SubnetInput'
        - type: object
          required: [subnetId, createdAt, updatedAt]
          properties:
            subnetId:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ListSubnetsResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [subnets]
          properties:
            subnets:
              type: array
              items:
                $ref: '#/components/schemas/Subnet'

    SSHKeyInput:
      type: object
      required: [name, publicKey]
      properties:
        name:
          type: string
        publicKey:
          type: string
        privateKey:
          type: string
          format: password
          writeOnly: true
        comment:
          type: string

    SSHKey:
      type: object
      required: [name, sshKeyId, publicKey, createdAt, updatedAt]
      properties:
        name:
          type: string
          example: sshKeys/default
        sshKeyId:
          type: string
        publicKey:
          type: string
        comment:
          type: string
        keyType:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListSSHKeysResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [sshKeys]
          properties:
            sshKeys:
              type: array
              items:
                $ref: '#/components/schemas/SSHKey'

    HypervisorInput:
      type: object
      required: [name, connection]
      properties:
        name:
          type: string
        connection:
          type: object
          additionalProperties: true
        labels:
          type: object
          additionalProperties:
            type: string
        machineRef:
          type: string
        bridgeName:
          type: string

    Hypervisor:
      allOf:
        - $ref: '#/components/schemas/HypervisorInput'
        - type: object
          required: [hypervisorId, phase, vmCount, createdAt, updatedAt]
          properties:
            hypervisorId:
              type: string
            phase:
              type: string
            capacity:
              type: object
              additionalProperties: true
            used:
              type: object
              additionalProperties: true
            vmCount:
              type: integer
            libvirtURI:
              type: string
            lastHeartbeat:
              type: string
              format: date-time
            lastError:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ListHypervisorsResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [hypervisors]
          properties:
            hypervisors:
              type: array
              items:
                $ref: '#/components/schemas/Hypervisor'

    CloudInitTemplateInput:
      type: object
      required: [name, userData]
      properties:
        name:
          type: string
        userData:
          type: string
        networkConfig:
          type: string
        metadataTemplate:
          type: string
        description:
          type: string

    CloudInitTemplate:
      allOf:
        - $ref: '#/components/schemas/CloudInitTemplateInput'
        - type: object
          required: [cloudInitTemplateId, createdAt, updatedAt]
          properties:
            cloudInitTemplateId:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ListCloudInitTemplatesResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [cloudInitTemplates]
          properties:
            cloudInitTemplates:
              type: array
              items:
                $ref: '#/components/schemas/CloudInitTemplate'

    BootEnvironment:
      type: object
      required: [name, bootEnvironmentId, phase, updatedAt]
      properties:
        name:
          type: string
          example: bootEnvironments/default
        bootEnvironmentId:
          type: string
        phase:
          type: string
        message:
          type: string
        artifactDir:
          type: string
        logPath:
          type: string
        kernelPath:
          type: string
        initrdPath:
          type: string
        rootfsPath:
          type: string
        updatedAt:
          type: string
          format: date-time

    ListBootEnvironmentsResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [bootEnvironments]
          properties:
            bootEnvironments:
              type: array
              items:
                $ref: '#/components/schemas/BootEnvironment'

    OSImageInput:
      type: object
      required: [name, osFamily, osVersion, arch, format, source]
      properties:
        name:
          type: string
        osFamily:
          type: string
        osVersion:
          type: string
        arch:
          type: string
        format:
          type: string
        source:
          type: string
        variant:
          type: string
        url:
          type: string
        checksum:
          type: string
        sizeBytes:
          type: integer
          format: int64
        description:
          type: string
        manifest:
          type: object
          additionalProperties: true

    OSImage:
      allOf:
        - $ref: '#/components/schemas/OSImageInput'
        - type: object
          required: [osImageId, ready, createdAt, updatedAt]
          properties:
            osImageId:
              type: string
            ready:
              type: boolean
            error:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    UpdateOSImageStatusRequest:
      type: object
      required: [ready]
      properties:
        ready:
          type: boolean
        localPath:
          type: string
          writeOnly: true
        error:
          type: string

    ListOSImagesResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [osImages]
          properties:
            osImages:
              type: array
              items:
                $ref: '#/components/schemas/OSImage'

    ListDHCPLeasesResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [dhcpLeases]
          properties:
            dhcpLeases:
              type: array
              items:
                type: object
                additionalProperties: true

    ListAuditEventsResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [auditEvents]
          properties:
            auditEvents:
              type: array
              items:
                type: object
                additionalProperties: true

    DNSRecordInput:
      type: object
      required: [name, type, values]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [A, CNAME, TXT]
        ttl:
          type: integer
          minimum: 0
        values:
          type: array
          items:
            type: string

    DNSRecordUpdateInput:
      type: object
      required: [values]
      properties:
        ttl:
          type: integer
          minimum: 0
        values:
          type: array
          items:
            type: string

    DNSRecord:
      allOf:
        - $ref: '#/components/schemas/DNSRecordInput'
        - type: object
          required: [ttl, createdAt, updatedAt]
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ListDNSRecordsResponse:
      allOf:
        - $ref: '#/components/schemas/ListMetadata'
        - type: object
          required: [dnsRecords]
          properties:
            dnsRecords:
              type: array
              items:
                $ref: '#/components/schemas/DNSRecord'
