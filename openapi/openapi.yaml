      tags: [os-images]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - in: query
          name: osFamily
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
        - in: query
          name: variant
          schema:
            type: string
        - in: query
