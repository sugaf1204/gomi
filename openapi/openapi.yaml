openapi: 3.0.3
info:
  title: gomi API
  version: 1.0.0
servers:
  - url: /api/v1

tags:
  - name: setup
  - name: auth
  - name: machines
  - name: virtual-machines
  - name: hypervisors
  - name: subnets
  - name: ssh-keys
  - name: cloud-init-templates
  - name: os-images
  - name: boot-environments
  - name: dhcp-leases
  - name: dns-records
  - name: audit
  - name: users

paths:
  /setup/status:
    get:
      summary: Get first-run setup status
      tags: [setup]
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                required: [required]
                properties:
                  required:
                    type: boolean

  /setup/admin:
    post:
      summary: Create first admin
      description: Creates the initial admin user only when no users exist.
      tags: [setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFirstAdminRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Logout
      tags: [auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: logged out

  /me:
    get:
      summary: Get current user
      tags: [auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success

  /system-info:
    get:
      summary: Get system information
      tags: [auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success

  /machines:
    get:
      summary: List machines
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - in: query
          name: phase
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: subnetRef
          schema:
            type: string
          description: Canonical subnet resource name, for example subnets/lab.
        - in: query
          name: ipAssignment
          schema:
            type: string
            enum: [dhcp, static]
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMachinesResponse'
    post:
      summary: Create machine
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: query
          name: machineId
          required: true
          schema:
            type: string
          description: User-specified machine ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMachineRequest'
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '400':
          $ref: '#/components/responses/BadRequest'

  /machines/{name}:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    get:
      summary: Get machine
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete machine
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /machines/{name}:redeploy:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    post:
      summary: Redeploy machine OS
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeployMachineRequest'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'

  /machines/{name}:reinstall:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    post:
      summary: Reinstall machine OS
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeployMachineRequest'
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'

  /machines/{name}:powerOn:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    post:
      summary: Power on machine
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /machines/{name}:powerOff:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    post:
      summary: Power off machine
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /machines/{name}/settings:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    patch:
      summary: Update machine power settings
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMachineSettingsRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'

  /machines/{name}/network:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    patch:
      summary: Update machine network settings
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMachineNetworkRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'

  /machines/{name}/hardware:
    parameters:
      - $ref: '#/components/parameters/MachineName'
    get:
      summary: Get reported machine hardware
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: success

  /machines/discover:
    post:
      summary: Discover or register a machine from boot metadata
      tags: [machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverMachineRequest'
      responses:
        '200':
          description: success

  /virtual-machines:
    get:
      summary: List virtual machines
      tags: [virtual-machines]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - in: query
          name: phase
          schema:
