<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2b7a78"/>
  <!-- Crumpled paper ball — irregular lumpy polygon -->
  <polygon
    points="16,3 20,4.5 24.5,6 27,10 28.5,14 27.5,18 29,22 26,26.5 21.5,29 17,28.5 13,29 8.5,26.5 5.5,23 4,18.5 4.5,14 3.5,9.5 6.5,5.5 11,4"
    fill="#ede8da" stroke="#ccc5af" stroke-width="0.5"/>
  <!-- Crease lines — 3 main folds going across at different angles -->
  <line x1="11"  y1="4"   x2="17"  y2="28.5" stroke="#a8a090" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3.5" y1="9.5" x2="28.5" y2="18"  stroke="#a8a090" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4.5" y1="18.5" x2="27.5" y2="10" stroke="#bdb5a0" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Extra short crease for texture -->
  <line x1="20" y1="4.5" x2="26" y2="26.5" stroke="#bdb5a0" stroke-width="0.8" stroke-linecap="round"/>
</svg>
