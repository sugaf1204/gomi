name: Release OS Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y libguestfs-tools qemu-utils zstd
          sudo chmod 0644 /boot/vmlinuz-* || true

      - name: Build raw zstd OS image artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/os-images downloads/os-images
          images=(
            "ubuntu-22.04-amd64|https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img|https://cloud-images.ubuntu.com/jammy/current/SHA256SUMS|sha256"
            "ubuntu-24.04-amd64|https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img|https://cloud-images.ubuntu.com/noble/current/SHA256SUMS|sha256"
            "debian-13-amd64|https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2|https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS|sha512"
          )

          verify_checksum() {
            local file="$1" sums_file="$2" algo="$3" filename expected actual
            filename="$(basename "$file")"
            expected="$(awk -v f="$filename" '{name=$2; sub(/^\*/, "", name); if (name == f) {print $1; exit}}' "$sums_file")"
            if [[ -z "$expected" ]]; then
              echo "ERROR: ${filename} not found in ${sums_file}" >&2
              return 1
            fi
            case "$algo" in
              sha256) actual="$(sha256sum "$file" | awk '{print $1}')" ;;
              sha512) actual="$(sha512sum "$file" | awk '{print $1}')" ;;
              *) echo "ERROR: unsupported checksum algorithm: ${algo}" >&2; return 1 ;;
            esac
            if [[ "$actual" != "$expected" ]]; then
              echo "ERROR: checksum mismatch for ${filename}" >&2
              echo "  expected: ${expected}" >&2
              echo "  actual:   ${actual}" >&2
              return 1
            fi
          }

          : > dist/os-images/checksums-os-images.txt
          for entry in "${images[@]}"; do
            IFS='|' read -r name image_url sums_url algo <<< "$entry"
            src="downloads/os-images/$(basename "$image_url")"
            sums="downloads/os-images/${name}.${algo}sums"
            raw="dist/os-images/${name}.raw"
            zst="${raw}.zst"

            curl -fL --retry 3 --retry-delay 5 -o "$src" "$image_url"
            curl -fL --retry 3 --retry-delay 5 -o "$sums" "$sums_url"
            verify_checksum "$src" "$sums" "$algo"

            sudo LIBGUESTFS_BACKEND=direct virt-customize --no-network -a "$src" --mkdir /curtin
            qemu-img convert -O raw "$src" "$raw"
            zstd -T0 -19 -f "$raw" -o "$zst"
            rm -f "$raw"
            (cd dist/os-images && sha256sum "$(basename "$zst")" >> checksums-os-images.txt)
          done

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.raw.zst dist/os-images/checksums-os-images.txt --clobber
