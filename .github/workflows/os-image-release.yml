name: Release OS Images

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - id: matrix
        name: Generate OS image matrix
        run: |
          set -euo pipefail
          matrix="$(go run ./cmd/gomi-osimage catalog matrix)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install image build tools
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            printf 'https://archive.ubuntu.com/ubuntu\n' | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
          fi
          sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -print0 \
            | sudo xargs -0 sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g'
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y squashfs-tools xz-utils

      - name: Build rootfs SquashFS OS image artifact
        run: |
          set -euo pipefail
          rm -rf dist/os-images
          go build -trimpath -o /tmp/gomi-osimage ./cmd/gomi-osimage
          sudo -E /tmp/gomi-osimage build --name "${{ matrix.name }}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.name }}
          path: |
            dist/os-images/${{ matrix.name }}.rootfs.squashfs
            dist/os-images/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          path: dist/os-images
          merge-multiple: true

      - name: Write OS image manifest
        run: go run ./cmd/gomi-osimage manifest --dir dist/os-images

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.rootfs.squashfs dist/os-images/checksums-os-images.txt dist/os-images/manifest-os-images.json --clobber
