name: Release OS Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04-amd64-cloud
            os_family: ubuntu
            os_version: "22.04"
            arch: amd64
            variant: cloud
            kernel_package: ""
            kernel_package_resolve: ""
          - name: ubuntu-22.04-amd64-baremetal
            os_family: ubuntu
            os_version: "22.04"
            arch: amd64
            variant: baremetal
            kernel_package: linux-image-generic
            kernel_package_resolve: ""
          - name: ubuntu-24.04-amd64-cloud
            os_family: ubuntu
            os_version: "24.04"
            arch: amd64
            variant: cloud
            kernel_package: ""
            kernel_package_resolve: ""
          - name: ubuntu-24.04-amd64-baremetal
            os_family: ubuntu
            os_version: "24.04"
            arch: amd64
            variant: baremetal
            kernel_package: linux-image-generic
            kernel_package_resolve: ubuntu-generic-modules
          - name: debian-13-amd64-cloud
            os_family: debian
            os_version: "13"
            arch: amd64
            variant: cloud
            kernel_package: ""
            kernel_package_resolve: ""
          - name: debian-13-amd64-baremetal
            os_family: debian
            os_version: "13"
            arch: amd64
            variant: baremetal
            kernel_package: linux-image-amd64
            kernel_package_resolve: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y cloud-image-utils ovmf qemu-system-x86 qemu-utils zstd
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi

      - name: Build raw zstd OS image artifact
        env:
          IMAGE_NAME: ${{ matrix.name }}
          OS_FAMILY: ${{ matrix.os_family }}
          OS_VERSION: ${{ matrix.os_version }}
          ARCHITECTURE: ${{ matrix.arch }}
          VARIANT: ${{ matrix.variant }}
          KERNEL_PACKAGE: ${{ matrix.kernel_package }}
          KERNEL_PACKAGE_RESOLVE: ${{ matrix.kernel_package_resolve }}
        run: |
          set -euo pipefail
          rm -rf dist/os-images
          task os-image:build-cloudimg

      - name: Write image metadata
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.name }}
          OS_FAMILY: ${{ matrix.os_family }}
          OS_VERSION: ${{ matrix.os_version }}
          ARCHITECTURE: ${{ matrix.arch }}
          VARIANT: ${{ matrix.variant }}
          KERNEL_PACKAGE: ${{ matrix.kernel_package }}
        run: |
          set -euo pipefail
          zst="dist/os-images/${IMAGE_NAME}.raw.zst"
          python3 - <<'PY' > "dist/os-images/${IMAGE_NAME}.json"
          import json
          import os
          import pathlib
          import subprocess

          name = os.environ["IMAGE_NAME"]
          kernel = os.environ["KERNEL_PACKAGE"]
          artifact = f"{name}.raw.zst"
          path = pathlib.Path("dist/os-images") / artifact
          sha256 = subprocess.check_output(["sha256sum", str(path)], text=True).split()[0]
          print(json.dumps({
              "name": name,
              "osFamily": os.environ["OS_FAMILY"],
              "osVersion": os.environ["OS_VERSION"],
              "arch": os.environ["ARCHITECTURE"],
              "variant": os.environ["VARIANT"],
              "artifact": artifact,
              "sha256": sha256,
              "sizeBytes": path.stat().st_size,
              "packages": [kernel] if kernel else [],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.name }}
          path: |
            dist/os-images/${{ matrix.name }}.raw.zst
            dist/os-images/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          path: dist/os-images
          merge-multiple: true

      - name: Write OS image manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > dist/os-images/manifest-os-images.json
          import json
          import pathlib

          entries = []
          for path in sorted(pathlib.Path("dist/os-images").glob("*.json")):
              if path.name == "manifest-os-images.json":
                  continue
              entries.append(json.loads(path.read_text()))
          print(json.dumps(entries, indent=2, sort_keys=True))
          PY
          : > dist/os-images/checksums-os-images.txt
          for zst in dist/os-images/*.raw.zst; do
            sha256sum "$zst" >> dist/os-images/checksums-os-images.txt
          done
          find dist/os-images -maxdepth 1 -type f -name '*.json' ! -name 'manifest-os-images.json' -delete

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.raw.zst dist/os-images/checksums-os-images.txt dist/os-images/manifest-os-images.json --clobber
