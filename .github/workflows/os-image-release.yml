name: Release OS Images

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
    paths:
      - ".github/workflows/os-image-release.yml"
      - "cmd/gomi-osimage/**"
      - "internal/osimage/**"
      - "internal/osimagebuild/**"
      - "internal/oscatalog/**"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/os-image-release.yml"
      - "cmd/gomi-osimage/**"
      - "internal/osimage/**"
      - "internal/osimagebuild/**"
      - "internal/oscatalog/**"
      - "go.mod"
      - "go.sum"
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Build matrix
    if: github.event_name != 'pull_request_target' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'COLLABORATOR' || contains(github.event.pull_request.labels.*.name, 'ci:approved')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - if: env.ACT != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - id: matrix
        name: Generate OS image matrix
        run: |
          set -euo pipefail
          matrix="$(go run ./cmd/gomi-osimage catalog matrix)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    if: github.event_name != 'pull_request_target' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'COLLABORATOR' || contains(github.event.pull_request.labels.*.name, 'ci:approved')
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    steps:
      - if: env.ACT != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install distrobuilder image build tools
        run: |
          set -euo pipefail
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            printf 'https://archive.ubuntu.com/ubuntu\n' | sudo tee /etc/apt/apt-mirrors.txt >/dev/null
          fi
          sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -print0 \
            | sudo xargs -0 sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g'
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y debootstrap gpg rsync squashfs-tools git make build-essential libwin-hivex-perl wimtools genisoimage
          if [ "${ACT:-}" = "true" ]; then
            distrobuilder_src="$(mktemp -d)"
            git clone --depth 1 https://github.com/lxc/distrobuilder "$distrobuilder_src"
            GOTOOLCHAIN=auto make -C "$distrobuilder_src"
            sudo install -m 0755 "$(go env GOPATH)/bin/distrobuilder" /usr/local/bin/distrobuilder
          else
            sudo snap install distrobuilder --classic
          fi

      - name: Build rootfs SquashFS OS image artifact with distrobuilder
        run: |
          set -euo pipefail
          out_dir="${RUNNER_TEMP:-/tmp}/gomi-os-images/${{ matrix.name }}"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          go build -trimpath -o /tmp/gomi-osimage ./cmd/gomi-osimage
          sudo -E /tmp/gomi-osimage build --name "${{ matrix.name }}" --out-dir "$out_dir"
          sudo chown -R "$(id -u):$(id -g)" "$out_dir"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.name }}
          path: |
            ${{ runner.temp }}/gomi-os-images/${{ matrix.name }}/${{ matrix.name }}.rootfs.squashfs
            ${{ runner.temp }}/gomi-os-images/${{ matrix.name }}/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    if: github.event_name != 'pull_request_target'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - if: env.ACT != 'true'
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          path: dist/os-images
          merge-multiple: true

      - name: Write OS image manifest
        run: go run ./cmd/gomi-osimage manifest --dir dist/os-images

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.rootfs.squashfs dist/os-images/checksums-os-images.txt dist/os-images/manifest-os-images.json --clobber
