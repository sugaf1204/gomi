name: Release OS Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ubuntu-22-04:
    name: Build Ubuntu 22.04 target OS image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ubuntu-22.04-amd64-baremetal
      UBUNTU_SERIES: jammy
      ARCHITECTURE: amd64
      KERNEL_PACKAGE: linux-image-generic
    steps:
      - uses: actions/checkout@v6

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y cloud-image-utils ovmf qemu-system-x86 qemu-utils zstd
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi

      - name: Build raw zstd OS image artifact
        run: task os-image:build-ubuntu-22.04-baremetal

      - name: Write OS image manifest
        shell: bash
        run: |
          set -euo pipefail
          zst="dist/os-images/${IMAGE_NAME}.raw.zst"
          sha256="$(sha256sum "$zst" | awk '{print $1}')"
          size="$(stat -c%s "$zst")"
          printf '%s  %s\n' "$sha256" "$(basename "$zst")" > dist/os-images/checksums-os-images.txt
          NAME="$IMAGE_NAME" ARTIFACT="$(basename "$zst")" SHA256="$sha256" SIZE="$size" KERNEL_PACKAGE="$KERNEL_PACKAGE" python3 - <<'PY' > dist/os-images/manifest-os-images.json
          import json
          import os

          print(json.dumps([{
              "name": os.environ["NAME"],
              "variant": "baremetal",
              "artifact": os.environ["ARTIFACT"],
              "sha256": os.environ["SHA256"],
              "sizeBytes": int(os.environ["SIZE"]),
              "packages": [os.environ["KERNEL_PACKAGE"]],
          }], indent=2, sort_keys=True))
          PY

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.raw.zst dist/os-images/checksums-os-images.txt dist/os-images/manifest-os-images.json --clobber
