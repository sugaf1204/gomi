name: Release OS Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: os-image-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - id: matrix
        name: Generate OS image matrix
        run: |
          set -euo pipefail
          matrix="$(go run ./cmd/gomi-osimage catalog matrix)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Packer
        uses: hashicorp/setup-packer@v3

      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y cloud-image-utils ovmf qemu-system-x86 qemu-utils zstd
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi

      - name: Build raw zstd OS image artifact
        run: |
          set -euo pipefail
          rm -rf dist/os-images
          go run ./cmd/gomi-osimage build --name "${{ matrix.name }}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.name }}
          path: |
            dist/os-images/${{ matrix.name }}.raw.zst
            dist/os-images/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          path: dist/os-images
          merge-multiple: true

      - name: Write OS image manifest
        run: go run ./cmd/gomi-osimage manifest --dir dist/os-images

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" dist/os-images/*.raw.zst dist/os-images/checksums-os-images.txt dist/os-images/manifest-os-images.json --clobber
