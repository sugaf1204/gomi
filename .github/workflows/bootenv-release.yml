name: Release Boot Environment

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: bootenv-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'pull_request_target' || contains(github.event.pull_request.labels.*.name, 'ci:approved')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootenv
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: bootenv/go.mod
          cache-dependency-path: bootenv/go.sum
      - name: Install image build tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y libarchive-tools squashfs-tools
      - name: Test
        run: make test
      - name: Build boot environment
        run: make build OUT=dist/ubuntu-minimal-cloud-amd64 VERSION="${GITHUB_REF_NAME:-manual}"

      - name: Upload boot environment artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: bootenv-ubuntu-minimal-cloud-amd64
          path: |
            bootenv/dist/ubuntu-minimal-cloud-amd64/boot-kernel
            bootenv/dist/ubuntu-minimal-cloud-amd64/boot-initrd
            bootenv/dist/ubuntu-minimal-cloud-amd64/rootfs.squashfs
            bootenv/dist/ubuntu-minimal-cloud-amd64/boot.ipxe
            bootenv/dist/ubuntu-minimal-cloud-amd64/manifest.json
            bootenv/dist/ubuntu-minimal-cloud-amd64/checksums.txt
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download boot environment artifact
        uses: actions/download-artifact@v4
        with:
          name: bootenv-ubuntu-minimal-cloud-amd64
          path: bootenv/dist/ubuntu-minimal-cloud-amd64

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd bootenv/dist/ubuntu-minimal-cloud-amd64
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" boot-kernel boot-initrd rootfs.squashfs boot.ipxe manifest.json checksums.txt --clobber
