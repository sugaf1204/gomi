name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: deb-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y debhelper dpkg-dev fakeroot rsync

      - name: Build package
        run: task release:deb

      - name: Resolve package asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(packages/deb/*.deb)
          if [ "${#debs[@]}" -ne 1 ]; then
            printf 'Expected exactly one .deb package, found %s\n' "${#debs[@]}" >&2
            printf '%s\n' "${debs[@]:-}" >&2
            exit 1
          fi
          sha256sum "${debs[0]}" > "${debs[0]}.sha256"
          printf 'deb=%s\n' "${debs[0]}" >> "$GITHUB_OUTPUT"
          printf 'sha256=%s.sha256\n' "${debs[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          DEB: ${{ steps.package.outputs.deb }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" "$DEB" "$SHA256" --clobber
