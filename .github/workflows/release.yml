name: Release

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deb-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deb:
    name: Build Debian package
    if: github.event_name != 'pull_request_target' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'COLLABORATOR' || contains(github.event.pull_request.labels.*.name, 'ci:approved')
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
    steps:
      - name: Checkout
        if: env.ACT != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y debhelper dpkg-dev fakeroot rsync

      - name: Build package
        run: task release:deb

      - name: Resolve package asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(packages/deb/*.deb)
          if [ "${#debs[@]}" -ne 1 ]; then
            printf 'Expected exactly one .deb package, found %s\n' "${#debs[@]}" >&2
            printf '%s\n' "${debs[@]:-}" >&2
            exit 1
          fi
          sha256sum "${debs[0]}" > "${debs[0]}.sha256"
          printf 'deb=%s\n' "${debs[0]}" >> "$GITHUB_OUTPUT"
          printf 'sha256=%s.sha256\n' "${debs[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: |
            ${{ steps.package.outputs.deb }}
            ${{ steps.package.outputs.sha256 }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: packages/deb

      - name: Publish release assets
        if: env.ACT_SKIP_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(packages/deb/*.deb)
          sums=(packages/deb/*.deb.sha256)
          if [ "${#debs[@]}" -ne 1 ] || [ "${#sums[@]}" -ne 1 ]; then
            printf 'Expected one .deb and one checksum, found %s debs and %s checksums\n' "${#debs[@]}" "${#sums[@]}" >&2
            exit 1
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --generate-notes || {
              status=$?
              gh release view "$TAG" >/dev/null 2>&1 || exit "$status"
            }
          fi
          gh release upload "$TAG" "${debs[0]}" "${sums[0]}" --clobber
