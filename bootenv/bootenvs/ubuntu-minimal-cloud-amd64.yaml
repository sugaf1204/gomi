apiVersion: gomi.sugaf1204.github.io/ephemeral/v1alpha1
kind: BootEnvironment
metadata:
  name: ubuntu-minimal-cloud-amd64
spec:
  architecture: amd64
  kernel:
    package: linux-image-generic
  initramfs:
    backend: initramfs-tools
    packages:
      - cloud-initramfs-rooturl
      - cloud-initramfs-copymods
      - overlayroot
    cmdline:
      - ip=dhcp
      - overlayroot=tmpfs:recurse=0
      - rw
  rootfs:
    type: squashfs
    source:
      type: ubuntu-cloud-squashfs
      url: https://cloud-images.ubuntu.com/minimal/releases/jammy/release/
    packages:
      - ca-certificates
      - curl
      - wget
      - lshw
      - dhcpcd5
      - curtin
    files:
      - path: /etc/initramfs-tools/scripts/init-top/gomi-timing
        mode: "0755"
        contents: |
          #!/bin/sh
          PREREQ=""
          prereqs() { echo "$PREREQ"; }
          case "$1" in
            prereqs) prereqs; exit 0 ;;
          esac
          mkdir -p /run/gomi
          uptime_s="$(cut -d' ' -f1 /proc/uptime 2>/dev/null || echo 0)"
          printf '{"source":"initramfs","name":"initramfs.init_top","eventType":"marker","message":"initramfs init-top reached","monotonicSeconds":%s}\n' "$uptime_s" >> /run/gomi/timing.ndjson
      - path: /etc/initramfs-tools/scripts/local-top/00-gomi-timing
        mode: "0755"
        contents: |
          #!/bin/sh
          PREREQ=""
          prereqs() { echo "$PREREQ"; }
          case "$1" in
            prereqs) prereqs; exit 0 ;;
          esac
          mkdir -p /run/gomi
          uptime_s="$(cut -d' ' -f1 /proc/uptime 2>/dev/null || echo 0)"
          printf '{"source":"initramfs","name":"initramfs.local_top","eventType":"marker","message":"initramfs local-top reached before root fetch","monotonicSeconds":%s}\n' "$uptime_s" >> /run/gomi/timing.ndjson
      - path: /etc/initramfs-tools/scripts/local-bottom/gomi-timing
        mode: "0755"
        contents: |
          #!/bin/sh
          PREREQ=""
          prereqs() { echo "$PREREQ"; }
          case "$1" in
            prereqs) prereqs; exit 0 ;;
          esac
          mkdir -p /run/gomi
          uptime_s="$(cut -d' ' -f1 /proc/uptime 2>/dev/null || echo 0)"
          printf '{"source":"initramfs","name":"initramfs.local_bottom","eventType":"marker","message":"initramfs local-bottom reached after root mount","monotonicSeconds":%s}\n' "$uptime_s" >> /run/gomi/timing.ndjson
      - path: /etc/initramfs-tools/scripts/init-bottom/gomi-timing
        mode: "0755"
        contents: |
          #!/bin/sh
          PREREQ=""
          prereqs() { echo "$PREREQ"; }
          case "$1" in
            prereqs) prereqs; exit 0 ;;
          esac
          mkdir -p /run/gomi
          uptime_s="$(cut -d' ' -f1 /proc/uptime 2>/dev/null || echo 0)"
          printf '{"source":"initramfs","name":"initramfs.init_bottom","eventType":"marker","message":"initramfs init-bottom reached before switch-root","monotonicSeconds":%s}\n' "$uptime_s" >> /run/gomi/timing.ndjson
          if [ -n "$rootmnt" ] && [ -d "$rootmnt" ]; then
            mkdir -p "$rootmnt/run/gomi"
            cp /run/gomi/timing.ndjson "$rootmnt/run/gomi/timing.ndjson" 2>/dev/null || true
          fi
      - path: /etc/initramfs-tools/conf.d/gomi-netboot
        mode: "0644"
        contents: |
          MODULES=netboot
      - path: /etc/gomi/agent.env
        mode: "0644"
        contents: |
          GOMI_METADATA_URL=http://gomi.local/metadata
          GOMI_WORKFLOW_URL=http://gomi.local/workflows
    services:
      - name: gomi-deploy-runner
        enable: true
        command:
          - /usr/local/sbin/gomi-deploy-runner
    build:
      compression: zstd
      blockSize: 1M
      output: rootfs.squashfs
  cmdline:
    - console=tty0
    - console=ttyS0
    - panic=10
  network:
    dhcp:
      enabled: true
      image: systemd-networkd
  controlPlane:
    metadataURL: http://gomi.local/metadata
    workflowURL: http://gomi.local/workflows
  pxe:
    baseURL: http://gomi.local/files/linux
    scriptName: boot.ipxe
    kernelPath: boot-kernel
    initrdPath: boot-initrd
    rootfsPath: rootfs.squashfs
