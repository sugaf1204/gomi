#cloud-config
users:
  - name: root
    lock_passwd: false
    plain_text_passwd: packer
    ssh_redirect_user: false
ssh_pwauth: true
disable_root: false
chpasswd:
  expire: false
preserve_hostname: true
runcmd:
  - sed -i -e '/^[#]*PermitRootLogin/s/^.*$/PermitRootLogin yes/' /etc/ssh/sshd_config
  - systemctl restart ssh
